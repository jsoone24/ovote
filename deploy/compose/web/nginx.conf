server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
  gzip_min_length 1024;

  # Vite SPA fallback — every unknown path resolves to index.html so
  # vue-router's history mode works without 404s on refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache static assets emitted by vite (hashed filenames).
  location /assets/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }
}
